<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️Kraliçem❤️</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  flex-direction: column;
  overflow: hidden;
}

h1, p {
  margin: 10px 0;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: black;
  font-size: 16px;
  cursor: pointer;
}

.hidden { display: none; }

#photo {
  margin-top: 20px;
  max-width: 80%;
  border-radius: 12px;
}

.heart {
  position: absolute;
  pointer-events: none;
  font-size: 25px;
  animation-name: floatUp;
  animation-timing-function: linear;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-600px) scale(1.5); opacity: 0; }
}
</style>
</head>
<body>

<h1 id="line1"></h1>
<p id="line2" class="hidden">Dünyanın en güzel kızını görmek ister misin?</p>
<button id="showPhotoBtn" class="hidden">Evet, görmek isterim</button>
<img id="photo" class="hidden" src="image.png" alt="Kraliçem">

<script>
const line1 = document.getElementById('line1');
const line2 = document.getElementById('line2');
const showPhotoBtn = document.getElementById('showPhotoBtn');
const photo = document.getElementById('photo');

line1.innerText = "HOŞGELDİN KRALİÇEM";

setTimeout(() => {
  line2.classList.remove('hidden');
  showPhotoBtn.classList.remove('hidden');
}, 3000);

showPhotoBtn.onclick = () => {
  photo.classList.remove('hidden');
  showPhotoBtn.style.display = 'none';
  createHearts();
};

function createHearts() {
  const numHearts = 10; // aynı anda uçacak kalp sayısı
  for (let i = 0; i < numHearts; i++) {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerText = "❤️";

    // ekranın her yerinden rastgele başlama (x ve y)
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.top = Math.random() * window.innerHeight + 'px';

    // rastgele boyut
    const size = 15 + Math.random() * 25;
    heart.style.fontSize = size + 'px';

    // rastgele animasyon süresi
    heart.style.animationDuration = (2 + Math.random() * 3) + 's';

    document.body.appendChild(heart);

    // animasyon bitince sil
    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  // sürekli üret
  setTimeout(createHearts, 500);
}
</script>

</body>
</html>
