<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️Kraliçem❤️</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  flex-direction: column;
  overflow: hidden;
}

h1, p {
  margin: 10px 0;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: black;
  font-size: 16px;
  cursor: pointer;
}

.hidden { display: none; }

#photo {
  margin-top: 20px;
  max-width: 80%;
  border-radius: 12px;
}

.heart {
  position: absolute;
  width: 30px;
  height: 30px;
  background: url('https://tr.wikipedia.org/wiki/Kalp_%28sembol%29#/media/Dosya:A_perfect_SVG_heart.svg') no-repeat center center;
  background-size: contain;
  pointer-events: none;
  animation: floatUp linear;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-500px) scale(1.5); opacity: 0; }
}
</style>
</head>
<body>

<h1 id="line1"></h1>
<p id="line2" class="hidden">Dünyanın en güzel kızını görmek ister misin?</p>
<button id="showPhotoBtn" class="hidden">Evet, görmek isterim</button>
<img id="photo" class="hidden" src="image.png" alt="Kraliçem">

<script>
const line1 = document.getElementById('line1');
const line2 = document.getElementById('line2');
const showPhotoBtn = document.getElementById('showPhotoBtn');
const photo = document.getElementById('photo');

// 1. Merhaba yazısı
line1.innerText = "HOŞGELDİN KRALİÇEM";

setTimeout(() => {
  line2.classList.remove('hidden');
  showPhotoBtn.classList.remove('hidden');
}, 3000);

// 2. Butona basınca fotoğraf ve kalpler
showPhotoBtn.onclick = () => {
  photo.classList.remove('hidden');
  showPhotoBtn.style.display = 'none';
  createHearts();
};

// 3. Kalp animasyonu fonksiyonu
function createHearts() {
  const numHearts = 20; // kaç kalp
  for (let i = 0; i < numHearts; i++) {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.animationDuration = (3 + Math.random() * 2) + 's';
    heart.style.width = 20 + Math.random() * 20 + 'px';
    heart.style.height = heart.style.width;
    document.body.appendChild(heart);

    // Kalp animasyonu bitince sil
    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  // Her 500ms'de yeni kalpler üret
  setTimeout(createHearts, 500);
}
</script>

</body>
</html>
